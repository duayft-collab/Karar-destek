<!DOCTYPE html>
<html lang="tr" data-theme="light">
<!--

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Emlak Pro — Giriş</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/themes.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="lcard">
    <div class="llogo">
      <svg width="42" height="42" viewBox="0 0 42 42"><rect width="42" height="42" rx="10" fill="#1a1814"/><polygon points="21,4 4,16 4,38 38,38 38,16" fill="none" stroke="#b8893a" stroke-width="2" stroke-linejoin="round"/><rect x="14" y="24" width="14" height="14" rx="2" fill="#b8893a"/><circle cx="31" cy="11" r="3" fill="#b8893a"/></svg>
      <div><div class="lname">Emlak Pro</div><div class="lsub">Gayrimenkul Yönetim Sistemi</div></div>
    </div>
    <div class="lvers">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px">
        <div class="lvers-no">V15.0.0</div>
        <div style="width:1px;height:16px;background:var(--bdr)"></div>
        <div class="lvers-ts">2025-03-19 22:45:00</div>
      </div>
    </div>
    <div class="ltabs">
      <div class="ltab active" id="tab-giris" onclick="authTab('giris')">Giriş Yap</div>
      <div class="ltab" id="tab-kayit" onclick="authTab('kayit')">Kayıt Ol</div>
    </div>
    <div id="l-err" class="lerr"></div>
    <div id="l-ok" class="lok"></div>

    <div id="form-giris">
      <div class="fr f1 mb12">
        <label>Kullanıcı Adı</label>
        <input type="text" id="inp-user" placeholder="admin" autocomplete="off" spellcheck="false"
          style="ime-mode:disabled"
          onkeyup="document.getElementById('inp-user').setAttribute('data-v',this.value)"
          onchange="document.getElementById('inp-user').setAttribute('data-v',this.value)">
      </div>
      <div class="fr f1 mb16">
        <label>Şifre</label>
        <input type="password" id="inp-pass" placeholder="••••••" autocomplete="new-password"
          onkeyup="document.getElementById('inp-pass').setAttribute('data-v',this.value)"
          onchange="document.getElementById('inp-pass').setAttribute('data-v',this.value)">
      </div>
      <button class="btn btn-pri" style="width:100%;justify-content:center;font-size:15px;padding:11px" onclick="doGiris()">Giriş Yap →</button>
      <div class="lhint">
        <b>Admin:</b> admin / admin123<br>
        <b>Demo:</b> demo / demo123
      </div>
    </div>

    <div id="form-kayit" style="display:none">
      <div class="fr f1 mb12"><label>Ad Soyad</label><input type="text" id="r-adsoyad" placeholder="Ahmet Yılmaz" autocomplete="off"></div>
      <div class="fr f1 mb12"><label>Kullanıcı Adı</label><input type="text" id="r-user" placeholder="kullanici1" autocomplete="off" spellcheck="false"></div>
      <div class="fr f1 mb16"><label>Şifre (min 6)</label><input type="password" id="r-pass" placeholder="••••••" autocomplete="off"></div>
      <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="doKayit()">Kayıt Ol →</button>
    </div>

    <div class="lfoot">
      <span style="font-size:10.5px;color:var(--ink3)">💾 Yerel Mod</span>
      <span class="ibtn" onclick="temaToggle()" id="login-tema-btn" style="cursor:pointer">🌙</span>
    </div>
  </div>
</div>

<!-- Bilgi: Bu sayfa standalone kullanılabilir. App içinde index.html tarafından yönetilir. -->
<script src="../config/app.config.js"></script>
<script src="../src/core/i18n.js"></script>
<script src="../src/core/error-handler.js"></script>
<script src="../src/core/auth.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/utils.js"></script>
<script>
  // ── Login Sayfa Bootstrap ──────────────────────────────
  I18N.init();
  ErrorHandler.init();

  function authTab(mod) {
    document.getElementById('tab-giris').classList.toggle('active', mod === 'giris');
    document.getElementById('tab-kayit').classList.toggle('active', mod === 'kayit');
    document.getElementById('form-giris').style.display = mod === 'giris' ? 'block' : 'none';
    document.getElementById('form-kayit').style.display = mod === 'kayit' ? 'block' : 'none';
    document.getElementById('l-err').style.display = 'none';
    document.getElementById('l-ok').style.display  = 'none';
  }

  function doGiris() {
    var u   = (document.getElementById('inp-user').getAttribute('data-v') || document.getElementById('inp-user').value || '').trim();
    var p   = (document.getElementById('inp-pass').getAttribute('data-v') || document.getElementById('inp-pass').value || '').trim();
    var err = document.getElementById('l-err');
    err.style.display = 'none';

    if (!u || !p) {
      err.textContent  = I18N.t('errEmpty');
      err.style.display = 'block';
      return;
    }

    var sonuc = AuthModule.girisYap(u, p);
    if (sonuc.hata) {
      err.textContent  = sonuc.hata;
      err.style.display = 'block';
      return;
    }

    window.aktifKullanici = sonuc.kullanici;
    LogModule.kaydet('login', 'Giriş: ' + sonuc.kullanici.adsoyad + ' (' + sonuc.kullanici.rol + ')');

    // index.html içinde çalışıyorsa
    if (typeof uygulamaBaslat === 'function') {
      uygulamaBaslat();
    } else {
      window.location.href = '../index.html';
    }
  }

  function doKayit() {
    var adsoyad   = document.getElementById('r-adsoyad').value.trim();
    var kullanici = document.getElementById('r-user').value.trim();
    var sifre     = document.getElementById('r-pass').value.trim();
    var err = document.getElementById('l-err');
    var ok  = document.getElementById('l-ok');
    err.style.display = 'none'; ok.style.display = 'none';

    if (!adsoyad || !kullanici || !sifre) { err.textContent = I18N.t('allFields'); err.style.display='block'; return; }
    if (sifre.length < 6)                { err.textContent = I18N.t('errWeak');   err.style.display='block'; return; }

    var sonuc = AuthModule.ekle(kullanici, sifre, adsoyad, 'user', []);
    if (sonuc.hata) { err.textContent = sonuc.hata; err.style.display='block'; return; }

    ok.textContent  = I18N.t('regSuccess');
    ok.style.display = 'block';
    authTab('giris');
  }

  // Enter key desteği
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var active = document.activeElement;
      if (active && (active.id === 'inp-user' || active.id === 'inp-pass')) {
        e.preventDefault(); doGiris();
      }
    }
  });

  function temaToggle() {
    var d    = document.documentElement;
    var dark = d.getAttribute('data-theme') === 'dark';
    d.setAttribute('data-theme', dark ? 'light' : 'dark');
    localStorage.setItem('ep_theme_v15', dark ? 'light' : 'dark');
    ['tema-btn','login-tema-btn'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.textContent = dark ? '🌙' : '☀️';
    });
  }

  // Tema restore
  (function() {
    var t = localStorage.getItem('ep_theme_v15');
    if (t) {
      document.documentElement.setAttribute('data-theme', t);
      ['tema-btn','login-tema-btn'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) el.textContent = t === 'dark' ? '☀️' : '🌙';
      });
    }
  })();
</script>
</body>
</html>
