<section
  id="page-lease"
  class="page"
  data-page="lease"
  data-title-tr="Sözleşme"
  data-title-en="Contract"
  data-fn="sozlesmeUret"
>
<div id="page-lease" class="page">
    <div class="ph"><div class="pgtitle">Sözleşme Üretici</div></div>
    <div class="g2">
      <div class="card">
        <div class="stitle">Sözleşme Bilgileri</div>
        <div class="fr"><div><label>Kiraya Veren</label><input id="s-veren" placeholder="Ad Soyad"></div><div><label>TC/VKN</label><input id="s-veren-tc"></div></div>
        <div class="fr f1"><label>Adres</label><input id="s-veren-adres"></div>
        <div class="divider"></div>
        <div class="fr"><div><label>Kiracı</label><input id="s-kiraci" placeholder="Ad Soyad"></div><div><label>TC/VKN</label><input id="s-kiraci-tc"></div></div>
        <div class="fr f1"><label>Kiracı Adresi</label><input id="s-kiraci-adres"></div>
        <div class="divider"></div>
        <div class="fr f1"><label>Mülk Adresi</label><input id="s-mulk"></div>
        <div class="fr f4"><div><label>Alan (m²)</label><input id="s-alan" placeholder="120"></div><div><label>Oda</label><input id="s-oda" placeholder="3+1"></div><div><label>Kat</label><input id="s-kat" placeholder="3"></div><div><label>Kullanım</label><select id="s-kullanim"><option>Konut</option><option>İşyeri</option></select></div></div>
        <div class="fr"><div><label>Kira (₺)</label><input type="number" id="s-kira" placeholder="15.000"></div><div><label>Depozito (₺)</label><input type="number" id="s-depozito" placeholder="30.000"></div></div>
        <div class="fr"><div><label>Başlangıç</label><input type="date" id="s-baslangic"></div><div><label>Süre</label><select id="s-sure"><option value="12">1 Yıl</option><option value="24">2 Yıl</option><option value="36">3 Yıl</option></select></div></div>
        <button class="btn btn-pri mt12" onclick="sozlesmeUret()" style="width:100%">Sözleşme Oluştur →</button>
      </div>
      <div class="card" style="position:sticky;top:58px;align-self:flex-start">
        <div class="stitle">Önizleme</div>
        <div id="lease-preview" style="text-align:center;padding:30px;color:var(--ink3)">Formu doldurun →</div>
        <div class="flex gap8 mt12" id="sozlesme-butonlar" style="display:none">
          <button class="btn btn-pri btn-sm" onclick="window.print()">Yazdır</button>
          <button class="btn btn-out btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('lease-preview').textContent).then(()=>alert('Kopyalandı.'))">Kopyala</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

  <!-- PİYASA İSTİHBARATI -->
</section>
