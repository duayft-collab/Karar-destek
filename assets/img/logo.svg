<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1814;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d2820;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a855;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8893a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#bgGrad)"/>

  <!-- House outline (Gayrimenkul) -->
  <polygon
    points="100,28 30,82 30,172 170,172 170,82"
    fill="none"
    stroke="url(#goldGrad)"
    stroke-width="6"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Door -->
  <rect x="76" y="118" width="48" height="54" rx="4"
    fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Window left -->
  <rect x="44" y="108" width="24" height="24" rx="3"
    fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <line x1="56" y1="108" x2="56" y2="132" stroke="url(#goldGrad)" stroke-width="2"/>
  <line x1="44" y1="120" x2="68" y2="120" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Window right -->
  <rect x="132" y="108" width="24" height="24" rx="3"
    fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <line x1="144" y1="108" x2="144" y2="132" stroke="url(#goldGrad)" stroke-width="2"/>
  <line x1="132" y1="120" x2="156" y2="120" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Roof peak accent -->
  <circle cx="100" cy="28" r="5" fill="url(#goldGrad)"/>

  <!-- D monogram (Duay) -->
  <text
    x="100" y="90"
    font-family="Georgia, serif"
    font-size="22"
    font-weight="bold"
    fill="url(#goldGrad)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
  >DUAY</text>
</svg>
